name: Go Vulnerability Check

on:
  workflow_call:
    inputs:
      container_image:
        required: true
        type: string

env:
  CGO_LDFLAGS_ALLOW: "-s|-w"
  PKG_CONFIG_LIBDIR: /opt/imgproxy/lib/pkgconfig
  LD_LIBRARY_PATH: /opt/imgproxy/lib
  GOFLAGS: -buildvcs=false

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run govulncheck (module scan)
        run: govulncheck -scan module

      - name: Run govulncheck (symbol scan)
        run: govulncheck -scan symbol ./...
